<!DOCTYPE html><html lang="my"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>YANT Multi-Tool Platform</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}body{background:#0d1117;color:#fff;padding:15px;}.navbar{background:#161b22;padding:12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}select{background:#0d1117;color:white;border:1px solid #30363d;padding:5px;border-radius:4px;}.tools-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}.btn{background:#21262d;border:1px solid #30363d;padding:18px 10px;border-radius:8px;color:#fff;font-size:12px;font-weight:bold;cursor:pointer;}</style></head><body><div class="navbar"><div id="title-text">YANT Multi-Tool Pro</div><select id="lang" onchange="changeLang()"><option value="mm">မြန်မာ</option><option value="en">English</option></select></div><div class="tools-grid"><button class="btn" id="t1" onclick="alert(\x27🎵 TikTok Downloader Core Engine Running...\x27)">🎵 TikTok ဒေါင်းလုဒ်</button><button class="btn" id="t2" onclick="alert(\x27🔵 FB Downloader Core Engine Running...\x27)">🔵 FB ဒေါင်းလုဒ်</button><button class="btn" id="t3" onclick="alert(\x27🎨 Premium Logo Maker Active...\x27)">🎨 Logo ပြုလုပ်ရန်</button><button class="btn" id="t4" onclick="alert(\x27🔑 VIP Password Creator Engine Active...\x27)">🔑 Password ထုတ်ရန်</button></div>
<div id="vip-lock-screen" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#060814;z-index:999999;flex-direction:column;justify-content:center;align-items:center;padding:20px;text-align:center;"><div style="background:#0b0f19;border:1px solid #21262d;padding:25px;border-radius:16px;max-width:340px;width:100%;box-shadow:0 8px 24px rgba(0,0,0,0.5);"><h2 style="color:#f85149;font-size:18px;margin-bottom:10px;">🎰 TRIAL EXPIRED 🎰</h2><p style="color:#8b949e;font-size:12px;margin-bottom:20px;line-height:1.4;">သင်၏ ၃ ရက် အခမဲ့ စမ်းသပ်ခွင့် သက်တမ်း ကုန်ဆုံးသွားပါပြီ။ စနစ်အား ဆက်လက်အသုံးပြုရန် Premium VIP Activation Key ထည့်သွင်းပေးပါ။</p><input id="vip-key-input" placeholder="YANT-XXXX-XXXX-XXXX" style="width:100%;padding:12px;background:#0d1117;border:1px solid #30363d;border-radius:8px;color:white;text-align:center;font-weight:bold;font-size:14px;margin-bottom:12px;"><button onclick="verifyVipKey()" style="width:100%;padding:12px;background:#238636;color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:13px;">UNLOCK PREMIUM SYSTEM</button><p id="lock-msg" style="color:#f85149;margin-top:10px;display:none;font-weight:bold;"></p></div></div><script>function checkVipSaaSExpiration(){let e=localStorage.getItem("yant_device_id");e||(e="YANT-DEV-"+Math.floor(1000+9000*Math.random()),localStorage.setItem("yant_device_id",e)),fetch("/api/verify-time",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({deviceId:e})}).then(e=>e.json()).then(e=>{if("EXPIRED"===e.status||"BANNED"===e.status){const e=document.getElementById("vip-lock-screen");e&&(e.style.display="flex",document.body.style.overflow="hidden")}})}function verifyVipKey(){const e=document.getElementById("vip-key-input").value.trim(),t=document.getElementById("lock-msg");e.startsWith("YANT-")?(alert("🎉 Premium VIP Access Granted! စနစ်အား အသုံးပြုနိုင်ပါပြီဗျာ။"),localStorage.clear(),location.reload()):(t.innerText="❌ Activation Key မှားယွင်းနေပါသည်။",t.style.display="block")}document.addEventListener("DOMContentLoaded",checkVipSaaSExpiration);const langData={mm:{t1:"🎵 TikTok ဒေါင်းလုဒ်",t2:"🔵 FB ဒေါင်းလုဒ်",t3:"🎨 Logo ပြုလုပ်ရန်",t4:"🔑 Password ထုတ်ရန်"},en:{t1:"🎵 TikTok Downloader",t2:"🔵 FB Downloader",t3:"🎨 Logo Maker",t4:"🔑 Password Generator"}};function changeLang(){const e=document.getElementById("lang").value;document.getElementById("t1").innerText=langData[e].t1,document.getElementById("t2").innerText=langData[e].t2,document.getElementById("t3").innerText=langData[e].t3,document.getElementById("t4").innerText=langData[e].t4}</script></body></html>
