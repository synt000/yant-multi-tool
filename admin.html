<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Admin</title><style>body{background:#0d1117;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;}input{display:block;margin:10px 0;padding:10px;width:250px;}button{padding:10px;background:#238636;color:white;border:none;border-radius:6px;cursor:pointer;width:100%;}</style></head><body><div><h2>🎰 Admin Panel</h2><input id="u" placeholder="Username"><input id="p" type="password" placeholder="Password"><button onclick="login()">Dashboard သို့ ဝင်ရန်</button><p id="e" style="color:red;display:none;"></p></div><script>function login(){fetch("/api/admin-login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:document.getElementById("u").value,password:document.getElementById("p").value})}).then(e=>e.json()).then(e=>{e.success?window.location.href="/pro-panel":(document.getElementById("e").innerText=e.message,document.getElementById("e").style.display="block")})}</script></body></html>
